<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#3b82f6",
            "background-light": "#f8faff",
            "background-dark": "#0f172a",
          },
          fontFamily: {
            "display": ["Public Sans", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
<!-- Liquid Glass Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/20 rounded-full blur-[150px] pointer-events-none"></div>
<div class="w-full max-w-md z-10">
<!-- TopAppBar Style Branding -->
<div class="flex flex-col items-center mb-8">
<div class="bg-primary/10 p-3 rounded-xl mb-4 text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="apartment">apartment</span>
</div>
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">HypeHouse</h2>
</div>
<!-- Main Card with Glassmorphism -->
<div class="bg-white/70 dark:bg-slate-900/50 backdrop-blur-xl border border-white/40 dark:border-slate-700/30 p-8 rounded-xl shadow-2xl shadow-primary/5">
<div class="mb-8">
<h1 class="text-3xl font-bold leading-tight mb-2">Create Account</h1>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
          Your future roommate already has the WiFi password. <span class="text-primary font-medium">Join them.</span>
</p>
</div>
<form class="space-y-5" onsubmit="return false;">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-xl">person</span>
<input class="w-full bg-white/50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700 rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Alex Johnson" type="text"/>
</div>
</div>
<!-- College Email -->
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">College Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-xl">school</span>
<input class="w-full bg-white/50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700 rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="alex.j@university.edu" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-xl">lock</span>
<input class="w-full bg-white/50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700 rounded-lg py-3.5 pl-12 pr-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer hover:text-primary transition-colors text-xl">visibility</span>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg transition-all shadow-lg shadow-primary/20 active:scale-[0.98]">
            Create Account
          </button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-600 dark:text-slate-400">
          Already have an account? 
          <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Login</a>
</p>
</div>
</div>
<!-- Terms and Policy -->
<div class="mt-8 text-center px-4">
<p class="text-xs text-slate-500 dark:text-slate-500 leading-relaxed">
        By signing up, you agree to our 
        <a class="underline hover:text-primary" href="#">Terms of Service</a> and 
        <a class="underline hover:text-primary" href="#">Privacy Policy</a>.
      </p>
</div>
</div>
<!-- Decorative floating bubble -->
<div class="fixed top-1/4 right-[15%] w-12 h-12 bg-white/40 dark:bg-slate-700/20 backdrop-blur-md rounded-full border border-white/50 dark:border-slate-600/30 flex items-center justify-center text-primary/60 hidden md:flex">
<span class="material-symbols-outlined">wifi</span>
</div>
<div class="fixed bottom-1/4 left-[15%] w-10 h-10 bg-white/40 dark:bg-slate-700/20 backdrop-blur-md rounded-full border border-white/50 dark:border-slate-600/30 flex items-center justify-center text-primary/60 hidden md:flex">
<span class="material-symbols-outlined text-sm">bed</span>
</div>
</body></html>
