<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - HypeHouse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#3b82f6",
                "background-light": "#f8fafd",
                "background-dark": "#0f172a",
              },
              fontFamily: {
                "display": ["Public Sans", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .liquid-blob {
            filter: blur(60px);
            z-index: -1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<!-- Decorative Liquid Glass Background Elements -->
<div class="absolute top-[-10%] left-[-5%] w-72 h-72 bg-primary/10 rounded-full liquid-blob"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-96 h-96 bg-primary/20 rounded-full liquid-blob"></div>
<div class="absolute top-1/4 right-1/4 w-48 h-48 bg-blue-200/30 rounded-full liquid-blob"></div>
<div class="w-full max-w-md">
<!-- Main Container -->
<div class="liquid-glass rounded-3xl p-8 md:p-10 flex flex-col items-center">
<!-- Header Section -->
<div class="mb-8 flex flex-col items-center">
<div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-4xl">domain</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight mb-2">HypeHouse</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm text-center font-medium px-4">
                    Find a room before your parents find your browser history
                </p>
</div>
<!-- Form Section -->
<form class="w-full space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">College Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors text-xl">alternate_email</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-slate-100" placeholder="yourname@college.edu" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors text-xl">lock</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 text-slate-900 dark:text-slate-100" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-slate-400 hover:text-slate-600 transition-colors text-xl">visibility</span>
</div>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-primary text-sm font-semibold hover:underline decoration-2 underline-offset-4" href="#">Forgot Password?</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-primary/25 active:scale-[0.98]" type="submit">
                    Login
                </button>
</form>
<!-- Divider -->
<div class="relative w-full my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200 dark:border-slate-700"></span>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-transparent text-slate-500 font-medium">New around here?</span>
</div>
</div>
<!-- Sign Up Button -->
<button class="w-full bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-bold py-4 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-all flex items-center justify-center gap-2 group">
                Create an account
                <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Footer Links -->
<div class="mt-8 flex justify-center gap-6 text-slate-400 text-xs font-medium">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</div>
</body></html>
