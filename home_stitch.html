<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
<script>

          theme: {
            extend: {
              fontFamily: {
                sans: ['Inter', 'sans-serif'],

<style data-purpose="glassmorphism-effects">
        /* Liquid Glass Effect from SCREEN_4 updated for White Background */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
        .glass-pill {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        /* Dynamic Shimmering Interaction Glow from SCREEN_4 (Deep blue, purple, pink) */
        @keyframes shimmer-glow {
            0% {
                border-color: rgba(59, 130, 246, 0.5);
                box-shadow: 0 0 15px rgba(59, 130, 246, 0.3), 0 0 30px rgba(147, 51, 234, 0.2);
            } 50% {
                border-color: rgba(236, 72, 153, 0.7);
                box-shadow: 0 0 25px rgba(236, 72, 153, 0.4), 0 0 50px rgba(59, 130, 246, 0.3);
            } 100% {
                border-color: rgba(59, 130, 246, 0.5);
                box-shadow: 0 0 15px rgba(59, 130, 246, 0.3), 0 0 30px rgba(147, 51, 234, 0.2);
            }
        }
        .active-glow {
            animation: shimmer-glow 3s infinite ease-in-out;
            border-width: 2px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
